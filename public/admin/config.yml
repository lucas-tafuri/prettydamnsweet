# Production: editors log in with a GitHub account that has access to the repo.
# The login popup is handled by the serverless functions in /api (Vercel).
backend:
  name: github
  repo: lucas-tafuri/prettydamnsweet
  branch: main
  base_url: https://prettydamnsweet.vercel.app
  auth_endpoint: api/auth
  commit_messages:
    create: "content: create {{collection}} “{{slug}}”"
    update: "content: update {{collection}} “{{slug}}”"
    delete: "content: delete {{collection}} “{{slug}}”"
    uploadMedia: "content: upload “{{path}}”"
    deleteMedia: "content: delete “{{path}}”"

# Local editing via `npm run cms` (decap-server) while `npm run dev` is running.
# When the proxy isn't running, the GitHub backend above is used instead.
local_backend: true

site_url: https://prettydamnsweet.vercel.app
display_url: https://prettydamnsweet.vercel.app

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    format: "frontmatter"
    summary: "{{title}}"
    # Editors can sort the list by any of these (Priority first)
    sortable_fields: ["order", "title", "client"]
    # Quick filters + grouping above the project list
    view_filters:
      - { label: "Featured on homepage", field: "featured", pattern: true }
      - { label: "Drafts (hidden)", field: "draft", pattern: true }
      - { label: "Published (live)", field: "draft", pattern: false }
    view_groups:
      - { label: "Category", field: "categories" }
    fields:
      # --- The essentials --------------------------------------------------
      - { name: "title", label: "Project title", widget: "string", hint: "Shown big at the top of the project page and on work cards." }
      - { name: "client", label: "Client", widget: "string", required: false, hint: "The brand or company this was made for. Leave blank if none." }
      - name: "categories"
        label: "Categories"
        widget: "select"
        multiple: true
        required: false
        hint: "Pick one or more. Controls which filters this project shows up under."
        options:
          - { label: "Design & Motion", value: "design-and-motion" }
          - { label: "Branded Content", value: "branded-content" }
          - { label: "Immersive Experiences", value: "immersive-experiences" }
          - { label: "Healthcare", value: "healthcare" }
          - { label: "Sports", value: "sports" }
          - { label: "Film & Theater", value: "film-and-theater" }
      - { name: "thumbnail", label: "Cover image", widget: "image", required: false, choose_url: true, hint: "The image shown on work cards and listings. Upload a file or paste an image link." }
      - { name: "mainVideo", label: "Main video", widget: "string", required: false, hint: "Paste a Vimeo or YouTube link (e.g. https://vimeo.com/123456789). Plays big at the top of the project." }
      - name: "body"
        label: "Project summary"
        widget: "markdown"
        required: false
        hint: "A short paragraph describing the project. Appears under the Overview heading."

      # --- Visibility & ordering ------------------------------------------
      - { name: "featured", label: "Show on homepage", widget: "boolean", required: false, default: false, hint: "Turn on to feature this project on the homepage." }
      - { name: "order", label: "Priority", widget: "number", required: false, default: 0, value_type: "int", hint: "Higher number = appears earlier in the work list. Leave at 0 for oldest/last." }
      - { name: "draft", label: "Hide this project", widget: "boolean", required: false, default: false, hint: "Turn on to keep this project hidden from the live site (work in progress)." }

      # --- Style frames ----------------------------------------------------
      - name: "styleFrames"
        label: "Style frames / screenshots"
        widget: "list"
        required: false
        hint: "Optional gallery of stills. Upload files or paste image links."
        field: { name: "url", label: "Image", widget: "image", choose_url: true }

      # --- The process -----------------------------------------------------
      - { name: "processDescription", label: "Process — description", widget: "markdown", required: false, hint: "Optional. Tell the story of how it was made." }
      - { name: "processVideo", label: "Process — video", widget: "string", required: false, hint: "Optional Vimeo or YouTube link for a case-study / process video." }
      - name: "processImages"
        label: "Process — images"
        widget: "list"
        required: false
        hint: "Optional gallery of process stills."
        field: { name: "url", label: "Image", widget: "image", choose_url: true }

      # --- More videos -----------------------------------------------------
      - { name: "secondVideo", label: "Extra video 2", widget: "string", required: false, hint: "Optional additional Vimeo/YouTube link." }
      - { name: "thirdVideo", label: "Extra video 3", widget: "string", required: false, hint: "Optional additional Vimeo/YouTube link." }
      - { name: "fourthVideo", label: "Extra video 4", widget: "string", required: false, hint: "Optional additional Vimeo/YouTube link." }

      # --- Behind the scenes ----------------------------------------------
      - { name: "btsDescription", label: "Behind the scenes — description", widget: "markdown", required: false, hint: "Optional behind-the-scenes write-up." }
      - { name: "btsVideo", label: "Behind the scenes — video", widget: "string", required: false, hint: "Optional Vimeo/YouTube link." }
      - name: "btsPhotos"
        label: "Behind the scenes — photos"
        widget: "list"
        required: false
        hint: "Optional gallery of behind-the-scenes photos."
        field: { name: "url", label: "Image", widget: "image", choose_url: true }

      # --- Credits ---------------------------------------------------------
      - { name: "credits", label: "Credits", widget: "markdown", required: false, hint: "Optional. Roles and names for the people/companies involved." }

  - name: "settings"
    label: "Site Settings"
    label_singular: "Site Settings"
    description: "Global content used across the site — brand info, contact details, and the About page copy."
    files:
      - name: "site"
        label: "Site Content"
        file: "src/content/settings/site.json"
        fields:
          - name: "brand"
            label: "Brand & contact"
            widget: "object"
            fields:
              - { name: "name", label: "Studio name", widget: "string" }
              - { name: "shortName", label: "Short name", widget: "string", hint: "Abbreviated name used in tight spaces." }
              - { name: "heroLineOne", label: "Homepage headline — line 1", widget: "string" }
              - { name: "heroLineTwo", label: "Homepage headline — line 2", widget: "string" }
              - { name: "tagline", label: "Tagline", widget: "text", hint: "One-sentence description of the studio." }
              - { name: "location", label: "Location", widget: "string" }
              - { name: "email", label: "Contact email", widget: "string" }
              - { name: "phone", label: "Phone", widget: "string" }
              - { name: "copyright", label: "Footer copyright", widget: "string" }
          - name: "social"
            label: "Social links"
            widget: "object"
            hint: "Full URLs to your social profiles."
            fields:
              - { name: "linkedin", label: "LinkedIn", widget: "string", required: false }
              - { name: "instagram", label: "Instagram", widget: "string", required: false }
              - { name: "twitter", label: "Twitter / X", widget: "string", required: false }
          - name: "about"
            label: "About page"
            widget: "object"
            fields:
              - { name: "lead", label: "Homepage intro paragraph", widget: "text" }
              - { name: "intro", label: "About intro", widget: "text" }
              - { name: "mission", label: "Mission", widget: "text" }
              - { name: "vision", label: "Vision", widget: "text" }
          - name: "stats"
            label: "Stats"
            widget: "list"
            fields:
              - { name: "value", label: "Value", widget: "string" }
              - { name: "label", label: "Label", widget: "string" }
          - name: "reputation"
            label: "Reputation rows"
            widget: "list"
            fields:
              - { name: "label", label: "Label", widget: "string" }
              - { name: "value", label: "Value", widget: "string" }
          - name: "whyPds"
            label: "Why PDS"
            widget: "list"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "body", label: "Body", widget: "text" }
          - name: "services"
            label: "Services"
            widget: "list"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "slug", label: "Slug", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
              - name: "capabilities"
                label: "Capabilities"
                widget: "list"
                field: { name: "item", label: "Capability", widget: "string" }
